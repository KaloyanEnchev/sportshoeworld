{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Profile | SportShoeWorld</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/home-no-profile.css' %}">
</head>
<body>

    <div class="form-card text-center">
        <span class="brand-logo">SPORT<span>SHOE</span>WORLD</span>
        <h2 class="fw-bold h4 mb-1">Create Profile</h2>
        <p class="small mb-4">Set up your account to browse the collection</p>

        <form method="POST" action="{% url 'common:home' %}" novalidate class="text-start">
            {% csrf_token %}

            {% for field in form %}
            <div class="form-group mb-3">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger small mt-1">
                        {{ field.errors|striptags }}
                    </div>
                {% endif %}
            </div>
            {% endfor %}

            <div class="d-grid">
                <button type="submit" class="btn btn-submit">
                    Complete Profile
                </button>
            </div>
        </form>
    </div>
</body>
</html>
