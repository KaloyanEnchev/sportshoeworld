{% extends 'shared/base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/account.css' %}">
{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-sm p-4 text-center" style="max-width: 450px; width: 100%;">

        <h3 class="mb-3 text-danger">Delete Account</h3>
        <p>Are you sure you want to delete your account? This action cannot be undone.</p>

        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger w-100 mb-2">Yes, Delete</button>
        </form>

        <a href="{% url 'accounts:details' object.pk %}" class="btn btn-secondary">Cancel</a>
    </div>
</div>
{% endblock %}
