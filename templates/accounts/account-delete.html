{% extends 'shared/base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/account.css' %}">
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="form-card delete-card">

        <div class="warning-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>

        <span class="brand-logo">SPORT<span>SHOE</span></span>

        <h2 class="text-danger">Delete Account</h2>

        <p class="warning-text">
            Are you sure you want to terminate your membership?
            <strong>This action is permanent and cannot be undone.</strong>
        </p>

        <form method="POST" class="mt-4">
            {% csrf_token %}
            <button type="submit" class="btn-confirm-delete">
                Permanently Delete Account
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="{% url 'accounts:details' object.pk %}" class="btn-cancel">
                No, Keep My Account
            </a>
        </div>
    </div>
</div>
{% endblock %}
