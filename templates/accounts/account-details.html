{% extends 'shared/base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/account.css' %}">
{% endblock %}

{% block content %}
<section id="detailsPage" class="container py-5">
    <div class="profile-card shadow-lg">
        <div class="row g-0">
            <div class="col-md-4 profile-image-container">
                <img
                  src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_960_720.png"
                  alt="Profile Image"
                  class="img-fluid profile-img"
                />
            </div>
        
            <div class="col-md-8 p-5 d-flex flex-column justify-content-between">
                <div class="profile-text">
                    <h1 class="display-5 fw-bold mb-4 text-white">{{ object.username }}</h1>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <label>Username</label>
                            <p>{{ object.username }}</p>
                        </div>
                        <div class="info-item">
                            <label>Email Address</label>
                            <p>{{ object.email }}</p>
                        </div>
                        <div class="info-item">
                            <label>Age</label>
                            <p>{{ object.age }} years old</p>
                        </div>
                    </div>
                </div>
            
                <div class="action-area border-top pt-4 mt-4">
                    <a href="{% url 'accounts:delete' %}" class="btn-delete">
                        <i class="bi bi-trash me-2"></i>Delete Profile
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
